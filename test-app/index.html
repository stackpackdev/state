<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>State Agent Test App</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
      nav { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid #ddd; margin-bottom: 24px; align-items: center; }
      nav a { text-decoration: none; color: #0066cc; font-weight: 500; }
      nav a:hover { text-decoration: underline; }
      nav button { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
      h1 { margin-bottom: 16px; }
      h2 { margin: 16px 0 8px; }
      h3 { margin: 12px 0 6px; }
      ul { padding-left: 20px; }
      li { margin: 8px 0; }
      form div { margin-bottom: 12px; }
      label { display: block; font-weight: 500; margin-bottom: 4px; }
      input[type="text"], input[type="email"], textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
      textarea { min-height: 100px; resize: vertical; }
      button[type="submit"] { background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
      button[type="submit"]:disabled { background: #999; cursor: not-allowed; }
      button[type="submit"]:hover:not(:disabled) { background: #0052a3; }
      section { margin: 16px 0; }
      .filter-buttons { display: flex; gap: 8px; margin: 12px 0; }
      .filter-buttons button { background: #f0f0f0; border: 1px solid #ddd; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
      .filter-buttons button:hover { background: #e0e0e0; }
      .notification-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #f8f9fa; border-radius: 4px; margin: 4px 0; }
      .notification-item button { background: #6c757d; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
      .task-item { display: flex; align-items: center; gap: 8px; }
      .task-item input[type="checkbox"] { width: auto; }
      .error { color: #dc3545; }
      .success { color: #28a745; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
